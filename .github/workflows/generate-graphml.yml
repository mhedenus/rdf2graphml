name: Generate GraphML from RDF

on:
  workflow_dispatch:
    inputs:
      rdf_dir:
        description: 'Verzeichnis mit den RDF-Dateien'
        required: true
        default: 'data'
        type: string

permissions:
  contents: write

jobs:
  convert-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Repository auschecken
        uses: actions/checkout@v6

      - name: 💾 Bild-Cache wiederherstellen
        uses: actions/cache@v4
        with:
          path: .yed_image_cache
          key: yed-image-cache-${{ github.run_id }}
          restore-keys: |
            yed-image-cache-

      - name: 🐍 Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          # Wir nutzen den pip-Cache von GitHub, um Installationen zu beschleunigen
          cache: 'pip'

      - name: 📦 Paket installieren
        run: |
          python -m pip install --upgrade pip
          # Installiert das lokale Paket inklusive aller Abhängigkeiten (rdflib, Pillow, ...)
          pip install .

      - name: ⚙️ Konvertierung durchführen
        run: |
          rdf2graphml "${{ inputs.rdf_dir }}/generated.graphml" \
            --config graphml-config.json \
            -v \
            ${{ inputs.rdf_dir }}/*.ttl

      - name: 🚀 Ergebnis einchecken (Commit & Push)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(graph): Auto-update generated.graphml in ${{ inputs.rdf_dir }}"
          file_pattern: '${{ inputs.rdf_dir }}/generated.graphml'
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"