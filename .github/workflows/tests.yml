name: Python Tests

# Definiert, WANN die Tests ausgeführt werden sollen
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    # Eine Matrix erlaubt es dir, die Tests gleichzeitig mit mehreren Python-Versionen zu prüfen
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    # 1. Lädt deinen Code aus dem Repository auf den GitHub-Server
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Installiert die jeweilige Python-Version aus der Matrix
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip' # Beschleunigt die Installation bei zukünftigen Durchläufen

    # 3. Installiert dein Paket und die Test-Tools
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Installiert dein Paket im Editable-Modus, damit das src-Layout funktioniert
        pip install -e .
        # Installiert pytest und das Coverage-Plugin
        pip install pytest pytest-cov

    # 4. Führt deine Tests aus
    - name: Run tests with pytest
      # Nutzt die Konfiguration aus deiner pyproject.toml
      run: |
        pytest