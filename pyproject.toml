[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "rdf2graphml"
version = "0.3.0"
authors = [
  { name="Michael Hedenus", email="michael@hedenus.de" },
]
description = "Konvertiert RDF-Graphen deterministisch in yEd GraphML-Dateien."
readme = "README.md"
requires-python = ">=3.8"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "rdflib>=7.0.0",
    "Pillow>=10.0.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[project.scripts]
rdf2graphml = "rdf2graphml.cli:main"

